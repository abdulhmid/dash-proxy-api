services:
  api:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      DATABASE_POSTGRES_HOST: postgres
      DATABASE_POSTGRES_PORT: "5432"
      DATABASE_POSTGRES_USER: postgres
      DATABASE_POSTGRES_PASSWORD: postgres
      DATABASE_POSTGRES_DBNAME: api_source_proxy
      DATABASE_POSTGRES_SSLMODE: disable
      DATABASE_MONGO_URI: mongodb://mongodb:27017
      DATABASE_MONGO_DBNAME: api_source_proxy
      SERVER_PORT: "8080"
      JWT_SECRET: change-me-to-a-random-secret
      JWT_EXPIRY_HOUR: "24"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks:
      - app-network

  postgres:
    image: postgres:16-alpine
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_POSTGRES_DBNAME:-api_source_proxy}
      POSTGRES_USER: ${DB_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d
    networks:
      - app-network

  mongodb:
    image: mongo:7
    expose:
      - "27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

volumes:
  postgres-data:
  mongo-data:

networks:
  app-network:
    driver: bridge
